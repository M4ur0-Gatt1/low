name: build

# Al pushear un tag vX.Y.Z compila LOW para Windows, macOS y Linux
# y sube los artefactos al release de GitHub.
on:
  push:
    tags: ["v*"]

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Crear release (si no existe)
        run: gh release create "$GITHUB_REF_NAME" --title "LOW $GITHUB_REF_NAME" --generate-notes || true
        env:
          GH_TOKEN: ${{ github.token }}

  windows:
    needs: release
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Dependencias
        run: pip install -r requirements.txt pyinstaller
      - name: Compilar exe
        run: pyinstaller LOW.spec --noconfirm
      - name: Instalador (Inno Setup)
        shell: pwsh
        run: |
          choco install innosetup -y --no-progress
          & "${env:ProgramFiles(x86)}\Inno Setup 6\ISCC.exe" low_installer.iss
      - name: Subir al release
        shell: bash
        run: gh release upload "$GITHUB_REF_NAME" Output/*.exe dist/LOW.exe --clobber
        env:
          GH_TOKEN: ${{ github.token }}

  macos:
    needs: release
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Dependencias
        run: pip install -r requirements.txt pyinstaller
      - name: Compilar
        run: pyinstaller LOW.spec --noconfirm
      - name: Empaquetar
        run: cd dist && zip -r LOW-macos.zip LOW*
      - name: Subir al release
        run: gh release upload "$GITHUB_REF_NAME" dist/LOW-macos.zip --clobber
        env:
          GH_TOKEN: ${{ github.token }}

  linux:
    needs: release
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Dependencias
        run: |
          pip install -r requirements.txt pyinstaller
          pip install "pywebview[qt]"
      - name: Compilar
        run: pyinstaller LOW.spec --noconfirm
      - name: Subir al release
        run: |
          mv dist/LOW dist/LOW-linux
          gh release upload "$GITHUB_REF_NAME" dist/LOW-linux --clobber
        env:
          GH_TOKEN: ${{ github.token }}
